<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Lyric Player</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');

        body {
            background-color: #0d0d0d;
            color: #00ffff;
            font-family: 'Fira Code', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .terminal-box {
            border: 2px solid #ff00ff;
            border-radius: 10px;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 0 15px #ff00ff40;
            margin-bottom: 20px;
        }

        h1 {
            color: #ff00ff;
            text-align: center;
            font-size: 1.5rem;
            text-shadow: 0 0 10px #ff00ff;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        input {
            flex: 1;
            background: transparent;
            border: 1px solid #00ffff;
            color: #00ffff;
            padding: 10px;
            font-family: 'Fira Code', monospace;
            outline: none;
        }

        button {
            background: transparent;
            border: 1px solid #ff00ff;
            color: #ff00ff;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Fira Code', monospace;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover {
            background: #ff00ff;
            color: #000;
        }

        #log {
            margin-top: 20px;
            color: #888;
            font-size: 0.9rem;
            min-height: 20px;
        }

        #stage {
            display: none;
            text-align: left;
            width: 100%;
            max-width: 600px;
        }

        .song-info {
            border: 1px dashed #00ffff;
            padding: 15px;
            text-align: center;
            margin-bottom: 30px;
        }

        .lyric-line {
            font-size: 1.2rem;
            line-height: 2;
            min-height: 40px;
            white-space: pre-wrap;
            /* Hiệu ứng màu gradient loang lổ */
            background: linear-gradient(90deg, #00ffff, #ff00ff, #ffff00);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-shift 3s infinite alternate;
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .time-stamp {
            color: #555;
            -webkit-text-fill-color: #555; /* override gradient */
            font-size: 0.9rem;
            margin-right: 10px;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background-color: white;
            vertical-align: text-bottom;
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .visualizer {
            text-align: center;
            color: #ff00ff;
            margin-top: 40px;
            font-size: 1.5rem;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

    <div class="terminal-box" id="searchBox">
        <h1>⚡ CYBERPUNK WEB PLAYER ⚡</h1>
        <div class="input-group">
            <input type="text" id="songInput" placeholder="Nhập tên bài hát + Ca sĩ..." autocomplete="off">
            <button onclick="searchSong()">TÌM KIẾM</button>
        </div>
        <div id="log">Chờ lệnh...</div>
    </div>

    <div id="stage">
        <div class="song-info" id="songInfo"></div>
        <div id="lyricContainer"></div>
        <div class="visualizer" id="visualizer">▂▃▄▅▆▇█</div>
    </div>

    <script>
        let audioCtx;
        const logEl = document.getElementById('log');
        const stageEl = document.getElementById('stage');
        const searchBoxEl = document.getElementById('searchBox');
        
        function log(msg, color = '#888') {
            logEl.innerHTML = `<span style="color:${color}">${msg}</span>`;
        }

        // Chơi nhạc bíp 8-bit dạo đầu
        function playBeep(timeDelay) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            setTimeout(() => {
                const oscillator = audioCtx.createOscillator();
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
                oscillator.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            }, timeDelay);
        }

        async function searchSong() {
            const query = document.getElementById('songInput').value.trim();
            if (!query) return;

            log(`[*] Đang kết nối vệ tinh tìm kiếm: '${query}'...`, '#00ffff');
            
            try {
                const res = await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(query)}`);
                const data = await res.json();
                
                const track = data.find(t => t.syncedLyrics);
                if (track) {
                    log(`[+] Đồng bộ thành công: ${track.trackName}`, '#00ff00');
                    startShow(track);
                } else {
                    log('[-] Không tìm thấy lyric chuẩn nhịp.', '#ff0000');
                }
            } catch (err) {
                log('[-] Lỗi kết nối mạng API.', '#ff0000');
            }
        }

        function parseLRC(lrcText) {
            const lines = lrcText.split('\n');
            const parsed = [];
            const regex = /\[(\d{2}):(\d{2}\.\d{2,3})\](.*)/;
            
            lines.forEach(line => {
                const match = line.match(regex);
                if (match && match[3].trim() !== '') {
                    const time = parseInt(match[1]) * 60 + parseFloat(match[2]);
                    parsed.push({ time, text: match[3].trim() });
                }
            });
            return parsed;
        }

        function startShow(track) {
            const lyrics = parseLRC(track.syncedLyrics);
            if (lyrics.length === 0) return;

            searchBoxEl.style.display = 'none';
            stageEl.style.display = 'block';

            document.getElementById('songInfo').innerHTML = `
                <div style="color:#00ffff; font-size:1.2rem; margin-bottom:5px;">NOW PLAYING: ${track.trackName.toUpperCase()}</div>
                <div style="color:#888;">by ${track.artistName}</div>
            `;

            // Đánh 4 nhịp bíp
            for(let i=0; i<4; i++) playBeep(i * 600);

            // Bắt đầu chạy lyric sau 2.5 giây dạo nhạc
            setTimeout(() => runLyrics(lyrics), 2500);
            animateVisualizer();
        }

        function runLyrics(lyrics) {
            const container = document.getElementById('lyricContainer');
            const startTime = Date.now();
            let currentIndex = 0;

            function checkTime() {
                const elapsed = (Date.now() - startTime) / 1000;
                
                if (currentIndex < lyrics.length && elapsed >= lyrics[currentIndex].time) {
                    const lineData = lyrics[currentIndex];
                    const min = Math.floor(lineData.time / 60).toString().padStart(2, '0');
                    const sec = Math.floor(lineData.time % 60).toString().padStart(2, '0');
                    
                    // Tạo thẻ mới cho dòng lyric
                    const lineDiv = document.createElement('div');
                    lineDiv.className = 'lyric-line';
                    lineDiv.innerHTML = `<span class="time-stamp">[${min}:${sec}] ❯ </span>`;
                    container.innerHTML = ''; // Xóa dòng cũ
                    container.appendChild(lineDiv);

                    // Hiệu ứng gõ chữ
                    typeWriter(lineData.text, lineDiv);
                    currentIndex++;
                }
                
                if (currentIndex < lyrics.length) {
                    requestAnimationFrame(checkTime);
                } else {
                    setTimeout(() => {
                        container.innerHTML = `<div style="text-align:center; color:#00ffff; margin-top:20px;">💎 CHUYẾN BAY KẾT THÚC 💎</div>`;
                        setTimeout(() => location.reload(), 3000); // Tải lại trang sau 3s
                    }, 5000);
                }
            }
            requestAnimationFrame(checkTime);
        }

        function typeWriter(text, element) {
            let i = 0;
            const textSpan = document.createElement('span');
            const cursor = document.createElement('div');
            cursor.className = 'cursor';
            
            element.appendChild(textSpan);
            element.appendChild(cursor);

            function type() {
                if (i < text.length) {
                    textSpan.textContent += text.charAt(i);
                    i++;
                    setTimeout(type, 60); // Tốc độ gõ chữ 60ms
                }
            }
            type();
        }

        function animateVisualizer() {
            const bars = [" ", "▃", "▄", "▅", "▆", "▇", "█"];
            const vis = document.getElementById('visualizer');
            setInterval(() => {
                let text = "";
                for(let i=0; i<15; i++) {
                    text += bars[Math.floor(Math.random() * bars.length)];
                }
                vis.innerText = `📊 ${text} 📊`;
            }, 100);
        }
    </script>
</body>
</html>
