<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Ép Apple nhận diện thành App Fullscreen (Không cần manifest.json) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="YSL Audio">
    <!-- Icon hiển thị ngoài màn hình chính của iPhone -->
    <link rel="apple-touch-icon" href="https://img.icons8.com/neon/512/cyberpunk-logo.png">
    <!-- Icon nhỏ trên thanh tab -->
    <link rel="icon" type="image/png" href="https://img.icons8.com/neon/512/cyberpunk-logo.png">
    
    <title>YSL AUDIO // Singularity Master</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f1f5f9;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.8);
            --primary-blue: #0284c7;
            --primary-gradient: linear-gradient(135deg, #0284c7, #38bdf8);
            --text-main: #0f172a;
            --text-sub: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            justify-content: center; overflow: hidden; position: relative;
        }

        .ambient-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90vw; height: 90vw; max-width: 800px; max-height: 800px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.15) 0%, rgba(255,255,255,0) 70%);
            z-index: 0; transition: all 0.3s ease;
        }
        .ambient-glow.playing { animation: pulse 2.5s infinite alternate ease-in-out; }
        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; } 100% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; } }

        #particleCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        .app-container {
            position: relative; z-index: 2; width: 92%; max-width: 550px;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 36px; padding: 35px 25px;
            box-shadow: 0 30px 60px rgba(14, 165, 233, 0.1), inset 0 2px 10px rgba(255,255,255,0.9);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            display: flex; flex-direction: column; min-height: 550px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .founder-badge {
            position: absolute; top: -15px; right: 30px; background: var(--primary-gradient);
            color: white; padding: 8px 20px; font-size: 0.75rem; font-weight: 800; letter-spacing: 2px;
            border-radius: 20px; box-shadow: 0 8px 20px rgba(14, 165, 233, 0.4);
            font-family: 'JetBrains Mono', monospace; z-index: 3;
        }

        h1 { font-size: 2.6rem; font-weight: 900; letter-spacing: -1.5px; margin-bottom: 5px; text-align: center; color: #0284c7; }
        .subtitle { color: #38bdf8; text-align: center; font-size: 0.85rem; font-weight: 700; margin-bottom: 30px; letter-spacing: 3px; font-family: 'JetBrains Mono', monospace; }

        .input-wrapper { display: flex; gap: 12px; margin-bottom: 25px; position: relative; }
        input[type="text"].main-search {
            flex: 1; background: rgba(255,255,255,0.9); border: 2px solid #e2e8f0; border-radius: 20px;
            color: var(--text-main); padding: 18px 22px; font-size: 1.1rem; outline: none; transition: all 0.3s; font-weight: 500;
        }
        input[type="text"].main-search:focus { border-color: var(--primary-blue); box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15); }
        
        button.btn-primary {
            background: var(--primary-gradient); border: none; border-radius: 20px; color: white;
            padding: 0 28px; font-weight: 800; font-size: 1.1rem; cursor: pointer; box-shadow: 0 6px 15px rgba(14, 165, 233, 0.3);
            transition: all 0.2s;
        }
        button.btn-primary:active { transform: scale(0.92); }

        .suggestions { margin-bottom: 25px; }
        .suggestions-title { font-size: 0.75rem; color: var(--text-sub); font-weight: 700; margin-bottom: 12px; letter-spacing: 1.5px; }
        .suggestion-tags { display: flex; flex-wrap: wrap; gap: 10px; }
        .suggest-tag {
            background: white; border: 1px solid #e2e8f0; color: var(--text-sub);
            padding: 10px 18px; border-radius: 24px; font-size: 0.85rem;
            font-weight: 600; cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .suggest-tag:active { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }

        .local-audio-wrapper {
            padding: 18px; border: 2px dashed #cbd5e1; border-radius: 20px; background: rgba(255, 255, 255, 0.5);
            text-align: center; transition: all 0.3s; cursor: pointer; margin-bottom: 20px;
        }
        .local-audio-wrapper label { color: var(--primary-blue); font-size: 0.95rem; font-weight: 700; cursor: pointer; }
        .local-audio-wrapper input[type="file"] { display: none; }
        
        .status-log { margin-top: auto; padding-top: 15px; color: var(--text-sub); font-size: 0.85rem; text-align: center; font-family: 'JetBrains Mono', monospace; font-weight: 500; }

        /* ================= PLAYER STAGE ================= */
        #stage { display: none; width: 100%; flex-direction: column; flex: 1; position: relative; }
        
        .swipe-hint { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); font-size: 0.75rem; color: #94a3b8; font-weight: 600; opacity: 0.6; pointer-events: none; letter-spacing: 1px; }

        .song-banner { text-align: center; margin-top: 25px; margin-bottom: 15px; }
        .song-title { font-size: 2rem; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 5px; line-height: 1.2; color: var(--text-main); }
        .song-artist { color: var(--primary-blue); font-size: 1.1rem; font-weight: 700; }

        .lyric-viewport {
            height: 250px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            margin: 15px 0; position: relative; mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent); -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
        }
        .lyric-row { text-align: center; transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); width: 100%; padding: 10px; display: flex; align-items: center; justify-content: center; line-height: 1.5; }
        .lyric-row.prev, .lyric-row.next { font-size: 1.15rem; opacity: 0.3; color: var(--text-sub); transform: scale(0.9); font-weight: 600; }
        
        .lyric-row.current {
            font-size: 1.8rem; font-weight: 900; transform: scale(1.08); padding: 15px 0;
            color: rgba(14, 165, 233, 0.15); position: relative;
        }
        /* Hiệu ứng Karaoke chuẩn xịn */
        .lyric-row.current::after {
            content: attr(data-text); position: absolute; left: 0; top: 15px; width: var(--fill-percent, 0%);
            height: 100%; color: var(--primary-blue); overflow: hidden; white-space: nowrap;
            display: flex; justify-content: center; transition: width 0.05s linear;
        }

        .time-badge { color: #94a3b8; font-size: 0.85rem; text-align: center; font-family: 'JetBrains Mono', monospace; font-weight: 600; margin-bottom: 10px; }

        .audio-player-panel { background: rgba(255,255,255,0.9); border: 1px solid #e2e8f0; border-radius: 24px; padding: 25px; margin-top: auto; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        .player-controls { display: flex; align-items: center; gap: 18px; }
        .play-btn {
            background: var(--primary-gradient); border: none; color: white; border-radius: 50%; width: 60px; height: 60px;
            display: flex; align-items: center; justify-content: center; font-size: 1.6rem; cursor: pointer;
            box-shadow: 0 10px 25px rgba(14, 165, 233, 0.4); transition: all 0.2s; flex-shrink: 0;
        }
        .play-btn:active { transform: scale(0.9); }
        
        .progress-container { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .progress-bar-wrapper { width: 100%; height: 10px; background: #e2e8f0; border-radius: 5px; cursor: pointer; position: relative; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--primary-gradient); border-radius: 5px; transition: width 0.1s linear; }
        .time-info { display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--text-sub); font-weight: 600; }

        .visualizer-container { display: flex; justify-content: center; align-items: flex-end; gap: 5px; height: 35px; margin-top: 15px; }
        .bar { width: 6px; height: 4px; background: var(--primary-blue); border-radius: 3px 3px 0 0; transition: height 0.08s ease; opacity: 0.8; }

        .spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid #e2e8f0; border-radius: 50%; border-top-color: var(--primary-blue); animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="ambient-glow" id="ambientGlow"></div>
    <canvas id="particleCanvas"></canvas>
    <audio id="mainAudio" crossOrigin="anonymous"></audio>

    <div class="app-container" id="appContainer">
        <div class="founder-badge">YSL CORE</div>
        
        <!-- SEARCH STAGE -->
        <div id="searchScreen">
            <h1>YSL AUDIO</h1>
            <div class="subtitle">SINGULARITY MASTER V15</div>

            <div class="input-wrapper">
                <input type="text" id="songInput" class="main-search" placeholder="Tên bài hát..." autocomplete="off">
                <button class="btn-primary" onclick="handleSearch()">GO</button>
            </div>

            <div class="suggestions">
                <div class="suggestions-title">🔥 THỊNH HÀNH</div>
                <div class="suggestion-tags">
                    <span class="suggest-tag" onclick="quickSearch('Đừng Làm Trái Tim Anh Đau')">Trái Tim Anh Đau</span>
                    <span class="suggest-tag" onclick="quickSearch('Ngủ Một Mình')">Ngủ Một Mình</span>
                    <span class="suggest-tag" onclick="quickSearch('Ngày Rời Chuyến Bay')">Ngày Rời Chuyến Bay</span>
                    <span class="suggest-tag" onclick="quickSearch('Muộn Rồi Mà Sao Còn')">Muộn Rồi Mà Sao Còn</span>
                </div>
            </div>

            <div class="local-audio-wrapper" onclick="document.getElementById('audioFileInput').click()">
                <label id="fileLabel">🎵 NẠP FILE MP3 TỪ MÁY (TÙY CHỌN)</label>
                <input type="file" id="audioFileInput" accept="audio/*" onchange="handleFileSelect(event)">
            </div>
            
            <div class="status-log" id="statusLog">Cỗ Máy YSL Bất Tử đã kích hoạt...</div>
        </div>

        <!-- PLAYER STAGE -->
        <div id="stage" ontouchstart="handleTouchStart(event)" ontouchmove="handleTouchMove(event)" ontouchend="handleTouchEnd()">
            <div class="swipe-hint">Vuốt sang phải để thoát ❯❯</div>
            
            <div class="song-banner">
                <div class="song-title" id="songTitle">TÊN BÀI HÁT</div>
                <div class="song-artist" id="songArtist">Ca sĩ biểu diễn</div>
            </div>

            <span class="time-badge" id="timeBadge">00:00</span>
            
            <div class="lyric-viewport">
                <div class="lyric-row prev" id="lyricPrev"></div>
                <div class="lyric-row current" id="lyricCurrent" data-text="Đang nạp dữ liệu...">Đang nạp dữ liệu...</div>
                <div class="lyric-row next" id="lyricNext"></div>
            </div>

            <div class="audio-player-panel">
                <div class="player-controls">
                    <button class="play-btn" id="playBtn" onclick="togglePlayback()">▶</button>
                    <div class="progress-container">
                        <div class="progress-bar-wrapper" id="progressBar" onmousedown="seekAudio(event)" ontouchstart="seekAudio(event)">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <div class="time-info">
                            <span id="timeCurrent">00:00</span>
                            <span id="timeTotal">00:00</span>
                        </div>
                    </div>
                </div>
                <div class="visualizer-container" id="visualizer"></div>
            </div>
        </div>
    </div>

    <script>
        // 1. PARTICLES (Hạt xanh lơ lửng)
        const canvas = document.getElementById('particleCanvas'); const ctx = canvas.getContext('2d'); let particles = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; } window.addEventListener('resize', resizeCanvas); resizeCanvas();
        class Particle { constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 2.5 + 0.5; this.speedY = Math.random() * 0.3 + 0.05; this.opacity = Math.random() * 0.3 + 0.1; } update() { this.y -= this.speedY; if (this.y < 0) { this.y = canvas.height; this.x = Math.random() * canvas.width; } } draw() { ctx.fillStyle = `rgba(14, 165, 233, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); } }
        function initParticles() { particles = []; for (let i = 0; i < 40; i++) particles.push(new Particle()); } initParticles();
        function animateParticles() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animateParticles); } animateParticles();

        // 2. SWIPE LOGIC
        let touchStartX = 0; let touchEndX = 0; const appContainer = document.getElementById('appContainer');
        function handleTouchStart(e) { touchStartX = e.changedTouches[0].screenX; }
        function handleTouchMove(e) { touchEndX = e.changedTouches[0].screenX; let diff = touchEndX - touchStartX; if(diff > 0 && diff < 150) appContainer.style.transform = `translateX(${diff/3}px)`; }
        function handleTouchEnd() { appContainer.style.transform = `translateX(0px)`; if (touchEndX - touchStartX > 100) resetApp(); }

        // 3. CORE LOGIC FETCH TRỰC TIẾP (BỎ CẦN VPS)
        function quickSearch(song) { document.getElementById('songInput').value = song; handleSearch(); }

        const audio = document.getElementById('mainAudio');
        let parsedLyrics = []; let currentTrackInfo = { title: "Unknown", artist: "" }; let localFileObject = null;

        function handleFileSelect(event) {
            const file = event.target.files[0]; if (!file) return; localFileObject = file;
            document.getElementById('fileLabel').innerHTML = `✅ Đã nạp: ${file.name.substring(0, 20)}...`;
        }

        async function handleSearch() {
            const query = document.getElementById('songInput').value.trim();
            const logEl = document.getElementById('statusLog');
            if (!query) return;

            logEl.innerHTML = `<div class="spinner"></div> Đang gọi vệ tinh YSL...`;
            appContainer.style.transform = 'scale(0.98)'; setTimeout(() => appContainer.style.transform = 'scale(1)', 200);

            try {
                // Gọi TRỰC TIẾP lên máy chủ Lyrics bằng HTTPS
                const lyricUrl = `https://lrclib.net/api/search?q=${encodeURIComponent(query)}`;
                const resLyric = await fetch(lyricUrl);
                if (!resLyric.ok) throw new Error("Máy chủ Lyrics đang bận.");
                const lyricData = await resLyric.json();
                
                let track = Array.isArray(lyricData) ? lyricData.find(t => t.syncedLyrics) : null;
                if (!track) { logEl.innerHTML = `<span style="color:#ef4444">Chưa có lời khớp nhịp cho bài này trên hệ thống.</span>`; return; }

                parsedLyrics = parseLRC(track.syncedLyrics);
                currentTrackInfo.title = track.trackName; currentTrackInfo.artist = track.artistName;

                if(localFileObject) {
                    audio.src = URL.createObjectURL(localFileObject);
                    logEl.innerHTML = `<span style="color:#0ea5e9">Mọi thứ đã sẵn sàng! Lên nhạc...</span>`;
                    setTimeout(() => startStage(), 500);
                } else {
                    logEl.innerHTML = `<div class="spinner"></div> Đang tải âm thanh chất lượng cao...`;
                    const itunesUrl = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&limit=1`;
                    const resMusic = await fetch(itunesUrl);
                    if (!resMusic.ok) throw new Error("Không thể tải nhạc.");
                    const musicData = await resMusic.json();

                    if (musicData && musicData.results && musicData.results.length > 0 && musicData.results[0].previewUrl) {
                        audio.src = musicData.results[0].previewUrl;
                        setTimeout(() => startStage(), 500);
                    } else { logEl.innerHTML = `<span style="color:#f59e0b">Chỉ có lời, không tìm thấy nhạc gốc. Nạp File MP3 của bạn để chạy!</span>`; }
                }
            } catch (error) { logEl.innerHTML = `<span style="color:#ef4444">${error.message}</span>`; }
        }

        function parseLRC(lrcText) {
            if(!lrcText) return []; const parsed = []; const regex = /\[(\d{2}):(\d{2}\.\d{2,3})\](.*)/;
            lrcText.split('\n').forEach(line => { const match = line.match(regex); if (match && match[3].trim() !== '') { parsed.push({ time: parseInt(match[1]) * 60 + parseFloat(match[2]), text: match[3].trim() }); } });
            return parsed.sort((a, b) => a.time - b.time);
        }

        // 4. PLAYER & KARAOKE LOGIC
        function startStage() {
            document.getElementById('searchScreen').style.display = 'none'; document.getElementById('stage').style.display = 'flex';
            document.getElementById('songTitle').textContent = currentTrackInfo.title; document.getElementById('songArtist').textContent = currentTrackInfo.artist;
            initVisualizer(); startVisualizerAnimation();
            audio.play().then(() => updatePlayState(true)).catch(e => updatePlayState(false));
            audio.addEventListener('timeupdate', syncLyricsWithAudio);
            audio.addEventListener('play', () => updatePlayState(true)); audio.addEventListener('pause', () => updatePlayState(false));
            audio.onended = () => { updatePlayState(false); setLyric("✨ YSL TRACK FINISHED ✨"); };
        }

        function updatePlayState(isPlaying) {
            document.getElementById('playBtn').innerHTML = isPlaying ? "⏸" : "▶";
            if(isPlaying) document.getElementById('ambientGlow').classList.add('playing');
            else document.getElementById('ambientGlow').classList.remove('playing');
        }

        function formatTime(secs) { if (isNaN(secs)) return "00:00"; return `${Math.floor(secs / 60).toString().padStart(2, '0')}:${Math.floor(secs % 60).toString().padStart(2, '0')}`; }

        function setLyric(text, prev="", next="") {
            const currEl = document.getElementById('lyricCurrent');
            currEl.textContent = text; currEl.setAttribute('data-text', text); 
            document.getElementById('lyricPrev').textContent = prev; document.getElementById('lyricNext').textContent = next;
        }

        let lastActiveIndex = -1;
        function syncLyricsWithAudio() {
            const currentTime = audio.currentTime; const duration = audio.duration || 0;
            document.getElementById('timeCurrent').textContent = formatTime(currentTime); document.getElementById('timeTotal').textContent = formatTime(duration);
            if(duration > 0) document.getElementById('progressFill').style.width = `${(currentTime / duration) * 100}%`;

            let activeIndex = -1; for (let i = 0; i < parsedLyrics.length; i++) { if (currentTime >= parsedLyrics[i].time) activeIndex = i; else break; }
            const currEl = document.getElementById('lyricCurrent');

            if (activeIndex !== lastActiveIndex) {
                lastActiveIndex = activeIndex;
                if (activeIndex === -1) {
                    document.getElementById('timeBadge').textContent = "00:00"; setLyric("🎵 Sẵn sàng...", "", parsedLyrics[0] ? parsedLyrics[0].text : ""); currEl.style.setProperty('--fill-percent', `0%`);
                } else {
                    document.getElementById('timeBadge').textContent = formatTime(parsedLyrics[activeIndex].time);
                    setLyric(parsedLyrics[activeIndex].text, parsedLyrics[activeIndex - 1] ? parsedLyrics[activeIndex - 1].text : "", parsedLyrics[activeIndex + 1] ? parsedLyrics[activeIndex + 1].text : "");
                }
            }

            if (activeIndex !== -1 && activeIndex < parsedLyrics.length) {
                const currentLineTime = parsedLyrics[activeIndex].time;
                const nextLineTime = (activeIndex + 1 < parsedLyrics.length) ? parsedLyrics[activeIndex + 1].time : currentLineTime + 3;
                let fillPercent = Math.min(100, Math.max(0, ((currentTime - currentLineTime) / (nextLineTime - currentLineTime)) * 100));
                currEl.style.setProperty('--fill-percent', `${fillPercent}%`);
            }
        }

        function seekAudio(event) {
            const bar = document.getElementById('progressBar'); const clientX = event.touches ? event.touches[0].clientX : event.clientX;
            if (audio.duration) { audio.currentTime = ((clientX - bar.getBoundingClientRect().left) / bar.getBoundingClientRect().width) * audio.duration; }
        }

        function togglePlayback() { if (audio.paused) audio.play(); else audio.pause(); }
        function resetApp() { audio.pause(); audio.currentTime = 0; updatePlayState(false); document.getElementById('stage').style.display = 'none'; document.getElementById('searchScreen').style.display = 'block'; document.getElementById('statusLog').innerHTML = "Cỗ Máy YSL Bất Tử đã kích hoạt..."; document.getElementById('songInput').value = ''; lastActiveIndex = -1; }
        document.getElementById('songInput').addEventListener('keypress', function(e) { if (e.key === 'Enter') handleSearch(); });

        // 5. VISUALIZER ENGINE
        function initVisualizer() {
            const container = document.getElementById('visualizer'); container.innerHTML = '';
            for(let i = 0; i < 24; i++) { const bar = document.createElement('div'); bar.className = 'bar'; container.appendChild(bar); }
        }

        function startVisualizerAnimation() {
            const bars = document.querySelectorAll('.bar');
            function animate() {
                bars.forEach(bar => {
                    let height = 4; if (!audio.paused) height = Math.floor(Math.random() * 25) + 4;
                    bar.style.height = `${height}px`;
                });
                if(document.getElementById('stage').style.display === 'flex') requestAnimationFrame(animate);
            }
            requestAnimationFrame(animate);
        }

        // TỰ ĐỘNG BỨT TỬ: Đập bỏ Service Worker Cũ NẾU CÓ để tránh lỗi Cache từ các bản trước.
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) { registration.unregister(); }
            });
        }
    </script>
</body>
</html>
