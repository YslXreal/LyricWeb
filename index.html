<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="YSL Audio">
    
    <link rel="manifest" href="manifest.json">
    <title>YSL AUDIO // Ultimate V10</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.6);
            --primary-blue: #0ea5e9;
            --primary-gradient: linear-gradient(135deg, #0284c7, #38bdf8);
            --text-main: #0f172a;
            --text-sub: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            justify-content: center; overflow: hidden; position: relative;
        }

        /* Nền ánh sáng động đập theo nhạc */
        .ambient-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80vw; height: 80vw; max-width: 800px; max-height: 800px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.15) 0%, rgba(255,255,255,0) 70%);
            z-index: 0; transition: all 0.3s ease;
        }
        .ambient-glow.playing { animation: pulse 2s infinite alternate ease-in-out; }
        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; } 100% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; } }

        #particleCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        .app-container {
            position: relative; z-index: 2; width: 92%; max-width: 550px;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 30px; padding: 35px 25px;
            box-shadow: 0 25px 50px rgba(14, 165, 233, 0.08), inset 0 2px 5px rgba(255,255,255,0.8);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            display: flex; flex-direction: column; min-height: 500px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .founder-badge {
            position: absolute; top: -15px; right: 30px; background: var(--primary-gradient);
            color: white; padding: 8px 18px; font-size: 0.75rem; font-weight: 800; letter-spacing: 2px;
            border-radius: 20px; box-shadow: 0 8px 20px rgba(14, 165, 233, 0.4);
            font-family: 'JetBrains Mono', monospace; z-index: 3;
        }

        h1 { font-size: 2.4rem; font-weight: 900; letter-spacing: -1.5px; margin-bottom: 5px; text-align: center; }
        .subtitle { color: var(--primary-blue); text-align: center; font-size: 0.8rem; font-weight: 600; margin-bottom: 30px; letter-spacing: 3px; font-family: 'JetBrains Mono', monospace; }

        .input-wrapper { display: flex; gap: 10px; margin-bottom: 20px; position: relative; }
        input[type="text"] {
            flex: 1; background: rgba(255,255,255,0.9); border: 2px solid #e2e8f0; border-radius: 16px;
            color: var(--text-main); padding: 18px 20px; font-size: 1.05rem; outline: none; transition: all 0.3s;
        }
        input[type="text"]:focus { border-color: var(--primary-blue); box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1); }
        
        button.btn-primary {
            background: var(--primary-gradient); border: none; border-radius: 16px; color: white;
            padding: 0 25px; font-weight: 800; cursor: pointer; box-shadow: 0 6px 15px rgba(14, 165, 233, 0.3);
            transition: all 0.2s;
        }
        button.btn-primary:active { transform: scale(0.95); }

        /* Đột phá: Khu vực Gợi ý bài hát */
        .suggestions { margin-bottom: 20px; }
        .suggestions-title { font-size: 0.75rem; color: var(--text-sub); font-weight: 600; margin-bottom: 10px; letter-spacing: 1px; }
        .suggestion-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .suggest-tag {
            background: rgba(14, 165, 233, 0.05); border: 1px solid rgba(14, 165, 233, 0.2);
            color: var(--primary-blue); padding: 8px 16px; border-radius: 20px; font-size: 0.85rem;
            font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .suggest-tag:active { background: var(--primary-blue); color: white; }

        .local-audio-wrapper {
            padding: 16px; border: 2px dashed #cbd5e1; border-radius: 16px; background: rgba(255, 255, 255, 0.4);
            text-align: center; transition: all 0.3s; cursor: pointer; margin-bottom: 15px;
        }
        .local-audio-wrapper label { color: var(--text-sub); font-size: 0.9rem; font-weight: 600; cursor: pointer; }
        
        .status-log { margin-top: auto; padding-top: 20px; color: var(--text-sub); font-size: 0.85rem; text-align: center; font-family: 'JetBrains Mono', monospace; }

        /* ================= PLAYER STAGE ================= */
        #stage { display: none; width: 100%; flex-direction: column; flex: 1; position: relative; }
        
        /* Chỉ dẫn vuốt */
        .swipe-hint {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%); font-size: 0.7rem; color: #94a3b8;
            opacity: 0.6; pointer-events: none; letter-spacing: 1px;
        }

        .song-banner { text-align: center; margin-top: 30px; margin-bottom: 20px; }
        .song-title { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 5px; line-height: 1.2; }
        .song-artist { color: var(--primary-blue); font-size: 1rem; font-weight: 600; }

        /* Đột phá: Lyric với hiệu ứng Fill-Color */
        .lyric-viewport {
            height: 220px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            margin: 10px 0; position: relative; mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent); -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
        }
        .lyric-row { text-align: center; transition: all 0.4s ease-out; width: 100%; padding: 8px 10px; display: flex; align-items: center; justify-content: center; line-height: 1.4; }
        .lyric-row.prev, .lyric-row.next { font-size: 1.05rem; opacity: 0.3; color: var(--text-sub); transform: scale(0.9); font-weight: 500; }
        
        .lyric-row.current {
            font-size: 1.5rem; font-weight: 800; transform: scale(1.05); padding: 15px 0;
            color: rgba(14, 165, 233, 0.2); /* Chữ chìm */
            position: relative;
        }
        /* Lớp màu chạy phủ lên chữ */
        .lyric-row.current::after {
            content: attr(data-text); position: absolute; left: 0; top: 15px; width: var(--fill-percent, 0%);
            height: 100%; color: var(--primary-blue); overflow: hidden; white-space: nowrap;
            display: flex; justify-content: center; transition: width 0.1s linear;
        }

        .time-badge { color: #94a3b8; font-size: 0.8rem; text-align: center; font-family: 'JetBrains Mono', monospace; }

        .audio-player-panel { background: white; border: 1px solid #e2e8f0; border-radius: 20px; padding: 25px 20px; margin-top: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.04); }
        .player-controls { display: flex; align-items: center; gap: 15px; }
        .play-btn {
            background: var(--primary-gradient); border: none; color: white; border-radius: 50%; width: 55px; height: 55px;
            display: flex; align-items: center; justify-content: center; font-size: 1.4rem; cursor: pointer;
            box-shadow: 0 8px 20px rgba(14, 165, 233, 0.35); transition: all 0.2s;
        }
        .play-btn:active { transform: scale(0.9); }
        
        .progress-container { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .progress-bar-wrapper { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; cursor: pointer; position: relative; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--primary-gradient); border-radius: 4px; transition: width 0.1s linear; }
        .time-info { display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: #94a3b8; }

        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #e2e8f0; border-radius: 50%; border-top-color: var(--primary-blue); animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="ambient-glow" id="ambientGlow"></div>
    <canvas id="particleCanvas"></canvas>
    <audio id="mainAudio" crossOrigin="anonymous"></audio>

    <div class="app-container" id="appContainer">
        <div class="founder-badge">YSL CORE</div>
        
        <!-- MÀN HÌNH TÌM KIẾM -->
        <div id="searchScreen">
            <h1>YSL AUDIO</h1>
            <div class="subtitle">Ultimate Edition V10</div>
            
            <div class="input-wrapper">
                <input type="text" id="songInput" placeholder="Tìm bài hát, nghệ sĩ..." autocomplete="off">
                <button class="btn-primary" onclick="handleSearch()">GO</button>
            </div>

            <!-- Gợi ý nhanh -->
            <div class="suggestions">
                <div class="suggestions-title">🔥 THỊNH HÀNH NGAY LÚC NÀY</div>
                <div class="suggestion-tags">
                    <span class="suggest-tag" onclick="quickSearch('Đừng Làm Trái Tim Anh Đau')">Đừng Làm Trái Tim Anh Đau</span>
                    <span class="suggest-tag" onclick="quickSearch('Ngủ Một Mình HIEUTHUHAI')">Ngủ Một Mình</span>
                    <span class="suggest-tag" onclick="quickSearch('Ngày Rời Chuyến Bay')">Ngày Rời Chuyến Bay</span>
                    <span class="suggest-tag" onclick="quickSearch('Chìm Sâu MCK')">Chìm Sâu</span>
                </div>
            </div>

            <div class="local-audio-wrapper" onclick="document.getElementById('audioFileInput').click()">
                <label id="fileLabel">🎵 HOẶC NẠP MP3 TỪ MÁY</label>
                <input type="file" id="audioFileInput" accept="audio/*" onchange="handleFileSelect(event)">
            </div>
            
            <div class="status-log" id="statusLog">Hệ thống YSL AI sẵn sàng...</div>
        </div>

        <!-- MÀN HÌNH PLAYER -->
        <!-- Đột phá: Bắt sự kiện Touch để Swipe to Go Back -->
        <div id="stage" ontouchstart="handleTouchStart(event)" ontouchmove="handleTouchMove(event)" ontouchend="handleTouchEnd()">
            <div class="swipe-hint">Vuốt sang phải để thoát ❯❯</div>
            
            <div class="song-banner">
                <div class="song-title" id="songTitle">TÊN BÀI HÁT</div>
                <div class="song-artist" id="songArtist">Ca sĩ biểu diễn</div>
            </div>

            <span class="time-badge" id="timeBadge">00:00</span>
            
            <div class="lyric-viewport">
                <div class="lyric-row prev" id="lyricPrev"></div>
                <div class="lyric-row current" id="lyricCurrent" data-text="Đang nạp luồng âm thanh...">Đang nạp luồng âm thanh...</div>
                <div class="lyric-row next" id="lyricNext"></div>
            </div>

            <div class="audio-player-panel">
                <div class="player-controls">
                    <button class="play-btn" id="playBtn" onclick="togglePlayback()">▶</button>
                    <div class="progress-container">
                        <div class="progress-bar-wrapper" id="progressBar" onmousedown="seekAudio(event)" ontouchstart="seekAudio(event)">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <div class="time-info">
                            <span id="timeCurrent">00:00</span>
                            <span id="timeTotal">00:00</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. HIỆU ỨNG HẠT PARTICLE ---
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2.5 + 0.5; this.speedY = Math.random() * 0.3 + 0.05; this.opacity = Math.random() * 0.3 + 0.1;
            }
            update() { this.y -= this.speedY; if (this.y < 0) { this.y = canvas.height; this.x = Math.random() * canvas.width; } }
            draw() { ctx.fillStyle = `rgba(14, 165, 233, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        function initParticles() { particles = []; for (let i = 0; i < 40; i++) particles.push(new Particle()); }
        initParticles();
        function animateParticles() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animateParticles); }
        animateParticles();

        // --- 2. XỬ LÝ VUỐT (SWIPE TO BACK) ---
        let touchStartX = 0;
        let touchEndX = 0;
        const appContainer = document.getElementById('appContainer');

        function handleTouchStart(e) { touchStartX = e.changedTouches[0].screenX; }
        function handleTouchMove(e) { 
            touchEndX = e.changedTouches[0].screenX; 
            let diff = touchEndX - touchStartX;
            if(diff > 0 && diff < 150) {
                // Hiệu ứng kéo nhẹ khung hình
                appContainer.style.transform = `translateX(${diff/3}px)`;
            }
        }
        function handleTouchEnd() {
            appContainer.style.transform = `translateX(0px)`;
            if (touchEndX - touchStartX > 100) { // Vuốt sang phải hơn 100px thì Back
                resetApp();
            }
        }

        function quickSearch(song) {
            document.getElementById('songInput').value = song;
            handleSearch();
        }

        // --- 3. CORE LOGIC FETCH API ĐA KÊNH ---
        async function fetchWithFallback(url) {
            try { const res = await fetch(url); if (res.ok) return await res.json(); } catch (e) {}
            try { const p1 = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`); if (p1.ok) return await p1.json(); } catch (e) {}
            try { const p2 = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`); if (p2.ok) { const d = await p2.json(); return JSON.parse(d.contents); } } catch (e) {}
            throw new Error("Mất kết nối với Đám mây YSL.");
        }

        const audio = document.getElementById('mainAudio');
        let parsedLyrics = [];
        let currentTrackInfo = { title: "Unknown", artist: "" };
        let localFileObject = null;

        function handleFileSelect(event) {
            const file = event.target.files[0]; if (!file) return; localFileObject = file;
            document.getElementById('fileLabel').innerHTML = `<span style="color:#0ea5e9; font-weight:700">✅ Đã nạp: ${file.name.substring(0, 20)}...</span>`;
        }

        async function handleSearch() {
            const query = document.getElementById('songInput').value.trim();
            const logEl = document.getElementById('statusLog');
            if (!query) return;

            logEl.innerHTML = `<div class="spinner"></div> Hệ thống đang xử lý...`;
            appContainer.style.transform = 'scale(0.98)'; setTimeout(() => appContainer.style.transform = 'scale(1)', 200);

            try {
                const lyricUrl = `https://lrclib.net/api/search?q=${encodeURIComponent(query)}`;
                const lyricData = await fetchWithFallback(lyricUrl);
                
                let track = Array.isArray(lyricData) ? lyricData.find(t => t.syncedLyrics) : null;
                if (!track) { logEl.innerHTML = `<span style="color:#ef4444">Chưa có Lyric khớp nhịp cho bài này.</span>`; return; }

                parsedLyrics = parseLRC(track.syncedLyrics);
                currentTrackInfo.title = track.trackName; currentTrackInfo.artist = track.artistName;

                if(localFileObject) {
                    audio.src = URL.createObjectURL(localFileObject);
                    setTimeout(() => startStage(), 500);
                } else {
                    const itunesUrl = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&limit=1`;
                    const musicData = await fetchWithFallback(itunesUrl);
                    if (musicData && musicData.results && musicData.results.length > 0 && musicData.results[0].previewUrl) {
                        audio.src = musicData.results[0].previewUrl;
                        setTimeout(() => startStage(), 500);
                    } else { logEl.innerHTML = `<span style="color:#f59e0b">Thiếu nhạc nền. Vui lòng nạp File MP3!</span>`; }
                }
            } catch (error) { logEl.innerHTML = `<span style="color:#ef4444">${error.message}</span>`; }
        }

        function parseLRC(lrcText) {
            if(!lrcText) return [];
            const parsed = [];
            const regex = /\[(\d{2}):(\d{2}\.\d{2,3})\](.*)/;
            lrcText.split('\n').forEach(line => {
                const match = line.match(regex);
                if (match && match[3].trim() !== '') {
                    parsed.push({ time: parseInt(match[1]) * 60 + parseFloat(match[2]), text: match[3].trim() });
                }
            });
            return parsed.sort((a, b) => a.time - b.time);
        }

        // --- 4. PLAYER & KARAOKE FILL EFFECT ---
        function startStage() {
            document.getElementById('searchScreen').style.display = 'none';
            document.getElementById('stage').style.display = 'flex';
            document.getElementById('songTitle').textContent = currentTrackInfo.title;
            document.getElementById('songArtist').textContent = currentTrackInfo.artist;

            audio.play().then(() => updatePlayState(true)).catch(e => updatePlayState(false));
            audio.addEventListener('timeupdate', syncLyricsWithAudio);
            audio.addEventListener('play', () => updatePlayState(true));
            audio.addEventListener('pause', () => updatePlayState(false));
            audio.onended = () => { updatePlayState(false); setLyric("✨ YSL TRACK FINISHED ✨"); };
        }

        function updatePlayState(isPlaying) {
            document.getElementById('playBtn').innerHTML = isPlaying ? "⏸" : "▶";
            if(isPlaying) document.getElementById('ambientGlow').classList.add('playing');
            else document.getElementById('ambientGlow').classList.remove('playing');
        }

        function formatTime(secs) {
            if (isNaN(secs)) return "00:00";
            return `${Math.floor(secs / 60).toString().padStart(2, '0')}:${Math.floor(secs % 60).toString().padStart(2, '0')}`;
        }

        function setLyric(text, prev="", next="") {
            const currEl = document.getElementById('lyricCurrent');
            currEl.textContent = text;
            currEl.setAttribute('data-text', text); // Đặt attribute để CSS dùng làm lớp fill màu
            document.getElementById('lyricPrev').textContent = prev;
            document.getElementById('lyricNext').textContent = next;
        }

        let lastActiveIndex = -1;
        function syncLyricsWithAudio() {
            const currentTime = audio.currentTime; const duration = audio.duration || 0;
            document.getElementById('timeCurrent').textContent = formatTime(currentTime);
            document.getElementById('timeTotal').textContent = formatTime(duration);
            if(duration > 0) document.getElementById('progressFill').style.width = `${(currentTime / duration) * 100}%`;

            let activeIndex = -1;
            for (let i = 0; i < parsedLyrics.length; i++) {
                if (currentTime >= parsedLyrics[i].time) activeIndex = i; else break;
            }

            const currEl = document.getElementById('lyricCurrent');

            // Cập nhật câu hát
            if (activeIndex !== lastActiveIndex) {
                lastActiveIndex = activeIndex;
                if (activeIndex === -1) {
                    document.getElementById('timeBadge').textContent = "00:00";
                    setLyric("🎵 Sẵn sàng...", "", parsedLyrics[0] ? parsedLyrics[0].text : "");
                    currEl.style.setProperty('--fill-percent', `0%`);
                } else {
                    document.getElementById('timeBadge').textContent = formatTime(parsedLyrics[activeIndex].time);
                    setLyric(
                        parsedLyrics[activeIndex].text,
                        parsedLyrics[activeIndex - 1] ? parsedLyrics[activeIndex - 1].text : "",
                        parsedLyrics[activeIndex + 1] ? parsedLyrics[activeIndex + 1].text : ""
                    );
                }
            }

            // Tính toán hiệu ứng Karaoke Fill-Color (tràn màu)
            if (activeIndex !== -1 && activeIndex < parsedLyrics.length) {
                const currentLineTime = parsedLyrics[activeIndex].time;
                // Nếu là câu cuối, gán thời gian end là current + 3s, nếu ko lấy thời gian câu tiếp theo
                const nextLineTime = (activeIndex + 1 < parsedLyrics.length) ? parsedLyrics[activeIndex + 1].time : currentLineTime + 3;
                
                const durationOfLine = nextLineTime - currentLineTime;
                const elapsedInLine = currentTime - currentLineTime;
                
                // Tính phần trăm tràn màu (từ 0% đến 100%)
                let fillPercent = Math.min(100, Math.max(0, (elapsedInLine / durationOfLine) * 100));
                currEl.style.setProperty('--fill-percent', `${fillPercent}%`);
            }
        }

        function seekAudio(event) {
            const bar = document.getElementById('progressBar');
            const clientX = event.touches ? event.touches[0].clientX : event.clientX;
            if (audio.duration) { audio.currentTime = ((clientX - bar.getBoundingClientRect().left) / bar.getBoundingClientRect().width) * audio.duration; }
        }

        function togglePlayback() { if (audio.paused) audio.play(); else audio.pause(); }
        
        function resetApp() {
            audio.pause(); audio.currentTime = 0; updatePlayState(false);
            document.getElementById('stage').style.display = 'none'; document.getElementById('searchScreen').style.display = 'block';
            document.getElementById('statusLog').innerHTML = "Hệ thống YSL AI sẵn sàng...";
            lastActiveIndex = -1;
        }

        document.getElementById('songInput').addEventListener('keypress', function(e) { if (e.key === 'Enter') handleSearch(); });
        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(()=>{}); }); }
    </script>
</body>
</html>
