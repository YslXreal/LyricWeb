<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Code Lab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    canvas#matrix-bg {
      position: fixed; top: 0; left: 0; z-index: 0;
    }
    .container {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      width: 100%;
    }
    .title {
      color: #0ff;
      font-size: 36px;
      text-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
      margin-bottom: 20px;
      animation: flicker 1.5s infinite alternate;
      text-align: center;
    }
    @keyframes flicker {
      0% { opacity: 1; text-shadow: 0 0 20px #0ff, 0 0 40px #0ff; }
      50% { opacity: 0.8; text-shadow: 0 0 10px #0ff, 0 0 20px #0ff; }
      100% { opacity: 1; text-shadow: 0 0 30px #0ff, 0 0 60px #0ff; }
    }
    .terminal {
      background: rgba(0, 0, 0, 0.85);
      border: 2px solid #0f0;
      border-radius: 5px;
      width: 90%;
      max-width: 700px;
      height: 300px;
      display: flex; flex-direction: column;
      justify-content: flex-end;
      padding: 15px;
      box-shadow: 0 0 30px rgba(0,255,0,0.3);
    }
    #terminal-output {
      flex-grow: 1;
      overflow-y: auto;
      white-space: pre-wrap;
      color: #0f0;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 10px;
    }
    #terminal-input-line {
      display: flex; align-items: center;
    }
    .prompt {
      color: #0f0; margin-right: 10px;
    }
    #cmd-input {
      background: transparent; border: none; color: #0f0;
      font: inherit; outline: none; flex-grow: 1;
      caret-color: #0f0;
    }
    .button {
      background: transparent;
      border: 2px solid #ff0;
      color: #ff0;
      font: inherit;
      font-size: 20px;
      padding: 10px 30px;
      cursor: pointer;
      margin-top: 20px;
      border-radius: 5px;
      text-shadow: 0 0 10px #ff0;
      transition: all 0.3s;
    }
    .button:hover {
      background: #ff0;
      color: #000;
      box-shadow: 0 0 30px #ff0;
    }
    /* Canvas cho battle sẽ ẩn, khi gọi sẽ hiện full */
    #battle-canvas {
      display: none; position: fixed; top: 0; left: 0; z-index: 10;
    }
  </style>
</head>
<body>
  <canvas id="matrix-bg"></canvas>
  <div class="container">
    <h1 class="title">CYBER CODE LAB</h1>
    <div class="terminal">
      <div id="terminal-output">Chào mừng! Gõ 'help' để xem lệnh.<br></div>
      <div id="terminal-input-line">
        <span class="prompt">guest@cyber:~$</span>
        <input type="text" id="cmd-input" autofocus>
      </div>
    </div>
    <button class="button" id="firework-btn">💥 PHÁO HOA CODE 💥</button>
  </div>
  <canvas id="battle-canvas"></canvas>

  <script>
    (function() {
      // ========== MATRIX BACKGROUND ==========
      const bgCanvas = document.getElementById('matrix-bg');
      const bgCtx = bgCanvas.getContext('2d');
      let bgW, bgH;
      function resizeBg() {
        bgW = bgCanvas.width = window.innerWidth;
        bgH = bgCanvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resizeBg);
      resizeBg();
      const matrixChars = 'ｱｲｳｴｵｶｷｸｹｺ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ<>{}[]()/#@$%&*+-=;:,.?';
      const fontSize = 14;
      const columns = Math.floor(bgW / fontSize);
      const drops = new Array(columns).fill(0).map(() => Math.random() * bgH / fontSize);
      function drawMatrix() {
        bgCtx.fillStyle = 'rgba(0,0,0,0.05)';
        bgCtx.fillRect(0,0,bgW,bgH);
        bgCtx.fillStyle = '#0a0';
        bgCtx.font = fontSize + 'px "Courier New"';
        for (let i = 0; i < columns; i++) {
          const ch = matrixChars[Math.floor(Math.random() * matrixChars.length)];
          const x = i * fontSize;
          const y = drops[i] * fontSize;
          bgCtx.fillText(ch, x, y);
          if (y > bgH / fontSize && Math.random() > 0.975) drops[i] = 0;
          drops[i]++;
        }
      }
      setInterval(drawMatrix, 33);

      // ========== TERMINAL ==========
      const termOutput = document.getElementById('terminal-output');
      const cmdInput = document.getElementById('cmd-input');
      function appendTerminal(text) {
        termOutput.textContent += text + '\n';
        termOutput.scrollTop = termOutput.scrollHeight;
      }
      cmdInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const cmd = cmdInput.value.trim().toLowerCase();
          appendTerminal('guest@cyber:~$ ' + cmd);
          cmdInput.value = '';
          if (cmd === 'anime') {
            appendTerminal('Bắt đầu phim chiến đấu...');
            startAnimeBattle();
          } else if (cmd === 'help') {
            appendTerminal('Lệnh có sẵn:');
            appendTerminal('  anime - Xem phim chiến đấu code');
            appendTerminal('  clear - Xóa màn hình terminal');
            appendTerminal('  help  - Hiện trợ giúp này');
          } else if (cmd === 'clear') {
            termOutput.textContent = '';
          } else {
            appendTerminal('Lệnh không tìm thấy: ' + cmd + '. Gõ "help".');
          }
        }
      });
      document.addEventListener('click', () => cmdInput.focus());

      // ========== ANIME BATTLE (giống code trước, rút gọn) ==========
      const battleCanvas = document.getElementById('battle-canvas');
      const battleCtx = battleCanvas.getContext('2d');
      let battleW, battleH;
      function resizeBattle() {
        battleW = battleCanvas.width = window.innerWidth;
        battleH = battleCanvas.height = window.innerHeight;
      }
      resizeBattle();
      window.addEventListener('resize', resizeBattle);
      let battleActive = false;
      let entities = [], projectiles = [], particles = [];
      let battleStartTime = 0;
      const BATTLE_DURATION = 120; // seconds
      let coreHp = 20;
      let bossSpawned = false;
      let bossEntity = null;
      let phase = 0;

      // Audio (simple)
      let audioCtx = null;
      function initAudio() {
        if (!audioCtx) {
          try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
        }
      }
      document.addEventListener('click', initAudio, { once: true });
      cmdInput.addEventListener('keydown', initAudio, { once: true });

      function playTone(freq, dur, type='square', vol=0.05) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.value = freq;
        gain.gain.value = vol;
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
      }
      function playBgMusic() {
        const notes = [110,130,146,165,174,196,220,246];
        for(let i=0;i<40;i++) playTone(notes[i%notes.length],0.4,'triangle',0.02,audioCtx.currentTime+i*0.5);
      }

      // Entities (giản lược)
      class Entity {
        constructor(x,y,type,side){
          this.x=x;this.y=y;this.type=type;this.side=side;
          this.speed=type==='boss'?20:type==='sniper'?30:50+Math.random()*50;
          this.hp=type==='boss'?30:type==='general'?4:1;
          this.maxHp=this.hp;
          this.shootTimer=type==='boss'?0.3:type==='sniper'?2:1+Math.random();
          this.shootCooldown=this.shootTimer;
          this.char=type==='boss'?'◈':type==='general'?'Ω':type==='sniper'?'ψ':String.fromCharCode(0x30A0+Math.random()*96);
          this.color=side==='blue'?'#4da6ff':(type==='boss'?'#c715ff':'#ff4d4d');
        }
        update(dt,projectiles){
          if(this.type==='core')return;
          this.x+=this.side==='blue'?this.speed*dt:-this.speed*dt;
          this.shootCooldown-=dt;
          if(this.shootCooldown<=0){
            const dir=this.side==='blue'?1:-1;
            projectiles.push({x:this.x+10,y:this.y-6,vx:dir*(this.type==='boss'?500:350),color:this.color,char:'➤'});
            this.shootCooldown=this.shootTimer;
          }
        }
        draw(ctx){
          ctx.fillStyle=this.color;
          ctx.font='18px "Courier New"';
          ctx.fillText(this.char,this.x,this.y);
          if(this.type==='boss'||this.type==='general'){
            const bw=30,bh=4;
            ctx.fillStyle='#333';
            ctx.fillRect(this.x-5,this.y-18,bw,bh);
            ctx.fillStyle=this.color;
            ctx.fillRect(this.x-5,this.y-18,bw*(this.hp/this.maxHp),bh);
          }
        }
      }

      function spawnWave(phaseLevel){
        if(phaseLevel===0){
          for(let i=0;i<8;i++) entities.push(new Entity(30,100+i*60,'soldier','blue'));
          for(let i=0;i<10;i++) entities.push(new Entity(battleW-60,80+i*55,'soldier','red'));
          entities.push(new Entity(battleW/2,battleH/2,'core','blue'));
        }else if(phaseLevel===1){
          for(let i=0;i<4;i++) entities.push(new Entity(20,150+i*80,'soldier','blue'));
          for(let i=0;i<2;i++) entities.push(new Entity(40,200+i*100,'sniper','blue'));
          for(let i=0;i<6;i++) entities.push(new Entity(battleW-50,100+i*70,'soldier','red'));
          for(let i=0;i<1;i++) entities.push(new Entity(battleW-80,250+i*120,'general','red'));
        }else if(phaseLevel===2){
          bossEntity=new Entity(battleW-120,battleH/2-30,'boss','red');
          entities.push(bossEntity);
          for(let i=0;i<4;i++) entities.push(new Entity(battleW-80,100+i*80,'soldier','red'));
          bossSpawned=true;
        }
      }

      function processCollisions(){
        for(let i=projectiles.length-1;i>=0;i--){
          let p=projectiles[i];
          let hit=false;
          for(let j=entities.length-1;j>=0;j--){
            let e=entities[j];
            if(e.type==='core')continue;
            if((p.vx>0&&e.side==='blue')||(p.vx<0&&e.side==='red'))continue;
            if(Math.abs(p.x-e.x)<18&&Math.abs(p.y-e.y)<18){
              e.hp--;
              if(e.hp<=0){
                for(let k=0;k<10;k++) particles.push({x:e.x,y:e.y,vx:(Math.random()-0.5)*200,vy:(Math.random()-0.5)*200,life:1,color:e.color,char:'*'});
                if(e===bossEntity) bossEntity=null;
                entities.splice(j,1);
              }
              projectiles.splice(i,1);
              hit=true; break;
            }
          }
        }
        // Core damage
        let core=entities.find(e=>e.type==='core');
        if(core){
          for(let e of entities){
            if(e.side==='red'&&Math.abs(e.x-core.x)<30&&Math.abs(e.y-core.y)<30){
              coreHp--;
              e.hp=0;
              entities.splice(entities.indexOf(e),1);
            }
          }
          if(coreHp<=0) endBattle('defeat');
        }
      }

      function endBattle(result){
        battleActive=false;
        battleCanvas.style.display='none';
        let msg=result==='victory'?'SYSTEM RESTORED':'SYSTEM CORRUPTED';
        appendTerminal('Phim kết thúc: '+msg);
        if(bossEntity&&bossEntity.hp<=0) appendTerminal('Boss bị tiêu diệt!');
        if(coreHp<=0) appendTerminal('Core đã bị phá hủy...');
      }

      let battleAnimId;
      function battleLoop(ts){
        if(!battleActive) return;
        let elapsed=(ts-battleStartTime)/1000;
        if(elapsed>30&&phase===0){phase=1;spawnWave(1);}
        if(elapsed>70&&!bossSpawned&&phase===1){phase=2;spawnWave(2);}
        if(elapsed>BATTLE_DURATION){
          if(coreHp>0&&(!bossEntity||bossEntity.hp<=0)) endBattle('victory');
          else endBattle('defeat');
          return;
        }
        const dt=0.016;
        for(let e of entities) e.update(dt,projectiles);
        for(let p of projectiles) p.x+=p.vx*dt;
        for(let p of particles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=2*dt;}
        projectiles=projectiles.filter(p=>p.x>0&&p.x<battleW);
        particles=particles.filter(p=>p.life>0);
        processCollisions();
        // Draw
        battleCtx.clearRect(0,0,battleW,battleH);
        battleCtx.fillStyle='rgba(0,0,0,0.3)';battleCtx.fillRect(0,0,battleW,battleH);
        for(let p of particles){
          battleCtx.globalAlpha=p.life;
          battleCtx.fillStyle=p.color;
          battleCtx.fillText(p.char,p.x,p.y);
          battleCtx.globalAlpha=1;
        }
        for(let e of entities) e.draw(battleCtx);
        for(let p of projectiles){
          battleCtx.fillStyle=p.color;
          battleCtx.fillText(p.char,p.x,p.y);
        }
        battleAnimId=requestAnimationFrame(battleLoop);
      }

      function startAnimeBattle(){
        if(battleActive) return;
        resizeBattle();
        entities=[];projectiles=[];particles=[];
        coreHp=20;bossSpawned=false;bossEntity=null;phase=0;
        spawnWave(0);
        battleActive=true;
        battleStartTime=performance.now();
        battleCanvas.style.display='block';
        playBgMusic();
        if(battleAnimId) cancelAnimationFrame(battleAnimId);
        battleAnimId=requestAnimationFrame(battleLoop);
      }

      // ========== FIREWORK BUTTON ==========
      document.getElementById('firework-btn').addEventListener('click', () => {
        for(let i=0;i<50;i++){
          let x=Math.random()*window.innerWidth;
          let y=Math.random()*window.innerHeight*0.6;
          let color='#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
          let p={x,y,vx:(Math.random()-0.5)*400,vy:(Math.random()-0.5)*400,life:1,color,char:String.fromCharCode(0x30A0+Math.random()*96)};
          // Thêm particle vẽ lên battle canvas? Ta sẽ dùng overlay tạm thời lên body
          // Đơn giản: tạo div? Nhưng ta dùng canvas nền? Thôi dùng battle canvas ẩn ko tốt, ta sẽ tạo hiệu ứng tạm trên body bằng CSS animation đơn giản hoặc dùng canvas riêng.
          // Giải pháp: vẽ lên battle canvas vì nó đang ẩn? Không, ta tạo 1 canvas riêng cho pháo hoa hoặc đơn giản là thêm div động. Nhưng để code gọn, ta dùng battle canvas luôn: nếu battle đang active thì ko làm gì, còn ko thì hiện battle canvas để vẽ pháo hoa trong 2s.
        }
        // Đơn giản: dùng class CSS tạo chữ rơi? Ta sẽ tạo một số div động.
        for(let i=0;i<30;i++){
          let div=document.createElement('div');
          div.textContent=String.fromCharCode(0x30A0+Math.random()*96);
          div.style.position='fixed';
          div.style.left=Math.random()*100+'vw';
          div.style.top='-20px';
          div.style.color='#'+Math.floor(Math.random()*16777215).toString(16);
          div.style.fontSize='24px';
          div.style.zIndex='20';
          div.style.animation='fall 2s linear forwards';
          document.body.appendChild(div);
          setTimeout(()=>div.remove(),2000);
        }
        // Thêm keyframe fall
        if(!document.getElementById('fall-style')){
          let style=document.createElement('style');
          style.id='fall-style';
          style.textContent=`@keyframes fall{0%{opacity:1;transform:translateY(0) rotate(0deg);}100%{opacity:0;transform:translateY(100vh) rotate(360deg);}}`;
          document.head.appendChild(style);
        }
      });
    })();
  </script>
</body>
</html>
